<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История сканирований — Telegram Analytics</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { padding: 30px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 20px; }
        .history-table th, .history-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; }
        .history-table th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
        .history-table tr:hover { background: #f5f5f5; }
        .empty { text-align: center; color: #999; padding: 40px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px; }
    </style>
</head>
<body>
    <div class="header-row">
        <h1 style="color:white; text-shadow:0 2px 8px rgba(0,0,0,0.5); margin:0;" data-i18n="history_page_title">📋 История сканирований</h1>
        <div class="lang-switcher">
            <label for="languageMenu" class="language-menu-label" data-i18n="change_language">ChangeLanguage</label>
            <select id="languageMenu" class="language-menu" aria-label="ChangeLanguage">
                <option value="ru">RU</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="he">HE</option>
            </select>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div id="historyContent"><p class="placeholder" data-i18n="history_loading">Загрузка...</p></div>
        </div>
    </div>
    <script src="/static/i18n.js"></script>
    <script>
    // Init i18n
    i18n.init();

    // Language switcher
    const languageMenu = document.getElementById('languageMenu');
    if (languageMenu) {
        languageMenu.value = i18n.lang;
        languageMenu.addEventListener('change', () => {
            i18n.lang = languageMenu.value;
            location.reload();
        });
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            i18n.lang = btn.dataset.lang;
            location.reload();
        });
    });
    document.querySelector('.lang-btn[data-lang="' + i18n.lang + '"]')?.classList.add('active');

    async function loadHistory() {
        try {
            const res = await fetch('/telegram/api/scan-history/all');
            const data = await res.json();
            const history = data.history || [];
            const el = document.getElementById('historyContent');
            if (history.length === 0) {
                el.innerHTML = '<p class="empty">' + i18n.t('history_empty_page') + '</p>';
                return;
            }
            let html = '<div class="table-container"><table class="history-table"><thead><tr>';
            html += '<th>#</th>';
            html += '<th>' + i18n.t('history_date') + '</th>';
            html += '<th>' + i18n.t('history_channel') + '</th>';
            html += '<th>' + i18n.t('history_media_type') + '</th>';
            html += '<th>' + i18n.t('history_messages') + '</th>';
            html += '<th>' + i18n.t('history_authors') + '</th>';
            html += '<th>' + i18n.t('history_topic') + '</th>';
            html += '</tr></thead><tbody>';
            const locale = i18n.locale();
            history.forEach((h, i) => {
                const dt = new Date(h.timestamp).toLocaleString(locale);
                html += '<tr>';
                html += '<td>' + (i + 1) + '</td>';
                html += '<td>' + dt + '</td>';
                html += '<td>' + (h.channel_title || h.channel_id) + ' <small style="color:#999;">(' + h.channel_id + ')</small></td>';
                html += '<td>' + (h.media_type || '-') + '</td>';
                html += '<td>' + (h.total_messages || 0) + '</td>';
                html += '<td>' + (h.unique_authors || 0) + '</td>';
                html += '<td>' + (h.topic_id || '-') + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('historyContent').innerHTML = '<p class="empty">' + i18n.t('status_network_error') + '</p>';
        }
    }
    loadHistory();
    </script>
</body>
</html>
